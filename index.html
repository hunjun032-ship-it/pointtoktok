```html id="pttoktok-final-v2"
<!--
파일 맨 위에 '''HTML 같은 거 있으면 전부 삭제하고
이 코드 전체로 덮어쓰기 하세요.
-->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>포인트톡톡</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800;900&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#fff7fb;
    font-family:'Pretendard',sans-serif;
    color:#222;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

.hidden{
    display:none !important;
}

.main-gradient{
    background:linear-gradient(135deg,#ff8eb3 0%,#ffc7a7 100%);
}

.soft-card{
    background:white;
    border-radius:30px;
    box-shadow:0 10px 35px rgba(0,0,0,.06);
}

.glass{
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(12px);
}

.active-nav{
    color:#ff4f87 !important;
    font-weight:900;
}

.loading-spin{
    animation:spin 1.1s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

button{
    border:none;
    cursor:pointer;
    transition:.15s;
}

button:active{
    transform:scale(.97);
}

</style>
</head>

<body>

<!-- 로딩 -->
<div id="loading-screen"
class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">

    <div class="text-7xl mb-6 loading-spin">🍭</div>

    <div class="text-pink-500 font-black text-lg">
        포인트톡톡에 연결 중입니다...
    </div>

</div>

<!-- 로그인 -->
<div id="login-page"
class="hidden min-h-screen flex flex-col justify-center items-center p-8 bg-white text-center">

    <div class="text-[110px] mb-6">🍭</div>

    <div class="text-5xl font-black text-pink-500 mb-3">
        포인트톡톡
    </div>

    <div class="text-gray-400 font-semibold leading-relaxed mb-14">
        출석하고 포인트 받고!<br>
        다양한 미션으로 리워드를 받아보세요
    </div>

    <button
    onclick="login()"
    class="w-full max-w-sm bg-yellow-400 text-white py-5 rounded-[28px] font-black text-lg shadow-xl">

        <i class="fab fa-google mr-2"></i>
        Google 계정으로 시작하기

    </button>

</div>

<!-- 앱 -->
<div id="app-layout"
class="hidden max-w-md mx-auto min-h-screen bg-[#fffafb] pb-40">

    <!-- 헤더 -->
    <div class="main-gradient rounded-b-[45px] p-7 text-white shadow-xl">

        <div class="flex justify-between items-center mb-8">

            <div>

                <div class="text-xs font-black tracking-[3px] opacity-80">
                    POINT TOKTOK
                </div>

                <div class="font-black text-lg mt-1">
                    안녕하세요 👋
                </div>

            </div>

            <button
            onclick="logout()"
            class="bg-white/20 px-4 py-2 rounded-full text-xs font-black">

                로그아웃

            </button>

        </div>

        <div class="glass rounded-[35px] p-8 text-center border border-white/30">

            <div class="text-pink-500 text-xs font-black tracking-[4px] mb-3">
                MY POINT
            </div>

            <div id="point-text"
            class="text-5xl font-black text-gray-800 tracking-tight">
                0 P
            </div>

            <div class="text-gray-400 text-sm mt-3 font-semibold">
                오늘도 포인트를 적립해보세요
            </div>

        </div>

    </div>

    <!-- HOME -->
    <main id="tab-home" class="p-6">

        <!-- 출석 -->
        <div
        onclick="attendance()"
        class="soft-card p-7 flex justify-between items-center border border-pink-100 mb-7">

            <div>

                <div class="font-black text-2xl text-gray-800">
                    출석체크
                </div>

                <div class="text-pink-500 font-bold mt-2">
                    매일 출석하고 100P 받아가세요
                </div>

            </div>

            <div class="text-6xl">🎁</div>

        </div>

        <!-- 공지 -->
        <div class="soft-card p-6 mb-7 border border-yellow-100">

            <div class="font-black text-lg mb-3">
                📢 공지사항
            </div>

            <div id="notice-area"
            class="text-sm text-gray-500 leading-relaxed font-semibold">
                현재 진행 중인 공지사항이 없습니다.
            </div>

        </div>

        <!-- 랭킹 -->
        <div class="soft-card p-6 mb-7">

            <div class="font-black text-xl mb-5">
                🏆 포인트 랭킹
            </div>

            <div id="ranking-list"
            class="space-y-3"></div>

        </div>

        <!-- 미션 -->
        <div>

            <div class="flex justify-between items-center mb-5">

                <div class="font-black text-xl">
                    오늘의 미션
                </div>

                <button
                id="add-mission-btn"
                onclick="addMission()"
                class="hidden bg-black text-white px-4 py-2 rounded-full text-xs font-black shadow-lg">

                    미션 추가

                </button>

            </div>

            <div id="mission-list"
            class="space-y-4"></div>

        </div>

    </main>

    <!-- 상품 -->
    <main id="tab-shop"
    class="hidden p-6">

        <div class="flex justify-between items-center mb-6">

            <div>

                <div class="font-black text-3xl text-pink-500">
                    상품교환
                </div>

                <div class="text-gray-400 text-sm font-semibold mt-2">
                    포인트로 다양한 상품을 교환해보세요
                </div>

            </div>

            <button
            id="add-product-btn"
            onclick="addProduct()"
            class="hidden bg-black text-white px-4 py-2 rounded-full text-xs font-black">

                상품 추가

            </button>

        </div>

        <div id="product-list"
        class="space-y-5"></div>

    </main>

    <!-- 관리자 -->
    <main id="tab-admin"
    class="hidden p-6">

        <div class="mb-8">

            <div class="text-red-500 font-black text-3xl">
                관리자 센터
            </div>

            <div class="text-gray-400 mt-2 text-sm font-semibold">
                회원 관리 및 운영
            </div>

        </div>

        <!-- 공지 -->
        <div class="soft-card p-5 mb-6">

            <div class="font-black mb-4">
                공지사항 등록
            </div>

            <button
            onclick="setNotice()"
            class="bg-pink-500 text-white px-5 py-3 rounded-2xl font-black w-full">

                공지사항 작성

            </button>

        </div>

        <!-- 교환 현황 -->
        <div class="soft-card p-5 mb-6">

            <div class="font-black text-lg mb-5">
                🎁 상품 교환 현황
            </div>

            <div id="exchange-list"
            class="space-y-3"></div>

        </div>

        <!-- 유저 -->
        <div id="user-list"
        class="space-y-5"></div>

    </main>

    <!-- 하단바 -->
    <nav
    class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-gray-100 p-5 flex justify-around rounded-t-[35px] shadow-2xl">

        <div
        id="nav-home"
        onclick="switchTab('home')"
        class="flex flex-col items-center active-nav text-gray-300 cursor-pointer">

            <i class="fas fa-house text-2xl"></i>
            <span class="text-xs mt-2 font-black">HOME</span>

        </div>

        <div
        id="nav-shop"
        onclick="switchTab('shop')"
        class="flex flex-col items-center text-gray-300 cursor-pointer">

            <i class="fas fa-gift text-2xl"></i>
            <span class="text-xs mt-2 font-black">SHOP</span>

        </div>

        <div
        id="nav-admin"
        onclick="switchTab('admin')"
        class="hidden flex flex-col items-center text-gray-300 cursor-pointer">

            <i class="fas fa-crown text-2xl"></i>
            <span class="text-xs mt-2 font-black">ADMIN</span>

        </div>

    </nav>

</div>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyAarFKJOQ9RVzMQp0mcEmtJfFkHESPxiRQ",
    authDomain: "point-toktok-d66e4.firebaseapp.com",
    projectId: "point-toktok-d66e4",
    storageBucket: "point-toktok-d66e4.appspot.com",
    messagingSenderId: "821851386502",
    appId: "1:821851386502:web:da04381c5d5ddec9525707"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const ADMIN_EMAIL = "hunjun032@gmail.com";

let myData = null;

const loadingScreen = document.getElementById('loading-screen');
const loginPage = document.getElementById('login-page');
const appLayout = document.getElementById('app-layout');

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
.then(()=>{

    auth.onAuthStateChanged(async(user)=>{

        if(user){

            loadingScreen.classList.add('hidden');
            loginPage.classList.add('hidden');
            appLayout.classList.remove('hidden');

            await initializeUser(user);

            loadMissions();
            loadProducts();
            loadRanking();
            loadNotice();

        }else{

            loadingScreen.classList.add('hidden');
            loginPage.classList.remove('hidden');
            appLayout.classList.add('hidden');

        }

    });

});

async function login(){

    try{

        await auth.signInWithPopup(provider);

    }catch(error){

        alert(error.message);

    }

}

async function logout(){

    const ok = confirm("로그아웃하시겠습니까?");

    if(!ok) return;

    await auth.signOut();

}

async function initializeUser(user){

    const ref = db.collection('users').doc(user.uid);

    const snap = await ref.get();

    const isAdmin = user.email === ADMIN_EMAIL;

    if(!snap.exists){

        await ref.set({

            name:user.displayName || "회원",
            email:user.email || "",
            points:0,
            status:"active",
            isAdmin:isAdmin,
            lastAttendance:""

        });

    }

    ref.onSnapshot((doc)=>{

        myData = doc.data();

        if(!myData) return;

        if(
            myData.status === "blocked" &&
            myData.email !== ADMIN_EMAIL
        ){

            alert("이용이 제한된 계정입니다.");
            auth.signOut();
            return;

        }

        document.getElementById('point-text').innerText =
        (myData.points || 0).toLocaleString() + " P";

        if(myData.isAdmin){

            document.getElementById('nav-admin')
            .classList.remove('hidden');

            document.getElementById('add-mission-btn')
            .classList.remove('hidden');

            document.getElementById('add-product-btn')
            .classList.remove('hidden');

            loadUsers();
            loadExchangeList();

        }

    });

}

function attendance(){

    if(!myData) return;

    const today = new Date().toLocaleDateString();

    if(myData.lastAttendance === today){

        alert("오늘은 이미 출석체크를 완료하셨습니다 😊");
        return;

    }

    db.collection('users')
    .doc(auth.currentUser.uid)
    .update({

        points:firebase.firestore.FieldValue.increment(100),
        lastAttendance:today

    });

    alert("출석체크 완료!\n100P가 적립되었습니다 🎉");

}

function loadMissions(){

    db.collection('missions')
    .orderBy('createdAt','desc')
    .onSnapshot((snapshot)=>{

        const list = document.getElementById('mission-list');
        list.innerHTML = "";

        if(snapshot.empty){
            list.innerHTML = `
            <div class="soft-card p-8 text-center text-gray-300 font-black">
                현재 진행 중인 미션이 없습니다
            </div>`;
            return;
        }

        snapshot.forEach((doc)=>{

            const m = doc.data();
            const missionId = doc.id;

            const isAdmin = myData && myData.isAdmin === true;

            list.innerHTML += `
            <div class="soft-card p-6 flex justify-between items-center">

                <div>
                    <div class="font-black text-lg">${m.title}</div>
                    <div class="text-sm text-gray-400 mt-2">
                        +${m.points}P 지급
                    </div>
                </div>

                <div class="flex items-center gap-2">

                    <div class="bg-yellow-400 text-white px-4 py-2 rounded-2xl font-black">
                        +${m.points}P
                    </div>

                    ${isAdmin ? `
                        <button
                            onclick="deleteMission('${missionId}')"
                            class="bg-red-500 text-white px-4 py-2 rounded-2xl font-black text-sm">
                            삭제
                        </button>
                    ` : ""}

                </div>

            </div>
            `;
        });

    });
}

        snapshot.forEach((doc)=>{

            const m = doc.data();

            list.innerHTML += `
            <div class="soft-card p-6 flex justify-between items-center">

                <div>
                    <div class="font-black text-lg">${m.title}</div>
                    <div class="text-sm text-gray-400 mt-2">
                        다양한 리워드를 받아보세요
                    </div>
                </div>

                <div class="bg-yellow-400 text-white px-5 py-3 rounded-2xl font-black">
                    +${m.points}P
                </div>

            </div>
            `;

        });

    });

}

function addMission(){

    const title = prompt("미션 제목");

    if(!title) return;

    const point = prompt("포인트");

    if(!point) return;

    db.collection('missions').add({

        title:title,
        points:Number(point),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()

    });

}

function addProduct(){

    const name = prompt("상품명을 입력해주세요");

    if(!name) return;

    const point = prompt("교환 포인트를 입력해주세요");

    if(!point) return;

    db.collection('products').add({

        name:name,
        point:Number(point),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()

    });

}

function loadProducts(){

    db.collection('products')
    .orderBy('createdAt','desc')
    .onSnapshot((snapshot)=>{

        const list = document.getElementById('product-list');

        list.innerHTML = "";

        if(snapshot.empty){

            list.innerHTML = `
            <div class="soft-card p-8 text-center text-gray-300 font-black">
                등록된 상품이 없습니다
            </div>
            `;

            return;

        }

        snapshot.forEach((doc)=>{

            const p = doc.data();

            list.innerHTML += `
            <div class="soft-card p-6">

                <div class="flex justify-between items-center">

                    <div>

                        <div class="font-black text-xl">
                            ${p.name}
                        </div>

                        <div class="text-pink-500 font-black mt-2">
                            ${p.point.toLocaleString()}P
                        </div>

                    </div>

                    <button
                    onclick="exchangeProduct('${doc.id}','${p.name}',${p.point})"
                    class="bg-pink-500 text-white px-5 py-3 rounded-2xl font-black">

                        교환하기

                    </button>

                </div>

            </div>
            `;

        });

    });

}

async function exchangeProduct(id,name,point){

    if((myData.points || 0) < point){

        alert("포인트가 부족합니다.");
        return;

    }

    const ok = confirm(
`${name} 상품을 교환하시겠습니까?

차감 포인트:
${point.toLocaleString()}P`
    );

    if(!ok) return;

    await db.collection('users')
    .doc(auth.currentUser.uid)
    .update({

        points:firebase.firestore.FieldValue.increment(-point)

    });

    await db.collection('exchanges').add({

        uid:auth.currentUser.uid,
        userName:myData.name,
        product:name,
        point:point,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()

    });

    alert("상품 교환 신청이 완료되었습니다.");

}

function loadExchangeList(){

    db.collection('exchanges')
    .orderBy('createdAt','desc')
    .onSnapshot((snapshot)=>{

        const list = document.getElementById('exchange-list');

        list.innerHTML = "";

        if(snapshot.empty){

            list.innerHTML = `
            <div class="text-gray-300 text-sm font-black">
                교환 내역이 없습니다
            </div>
            `;

            return;

        }

        snapshot.forEach((doc)=>{

            const e = doc.data();

            list.innerHTML += `
            <div class="border border-gray-100 rounded-2xl p-4">

                <div class="font-black">
                    ${e.userName}
                </div>

                <div class="text-sm text-gray-400 mt-1">
                    ${e.product}
                </div>

                <div class="text-pink-500 font-black mt-2">
                    -${e.point.toLocaleString()}P
                </div>

            </div>
            `;

        });

    });

}

function loadUsers(){

    db.collection('users')
    .onSnapshot((snapshot)=>{

        const list = document.getElementById('user-list');

        list.innerHTML = "";

        snapshot.forEach((doc)=>{

            const u = doc.data();
            const uid = doc.id;

            list.innerHTML += `
            <div class="soft-card p-6">

                <div class="flex justify-between items-start mb-5">

                    <div>

                        <div class="font-black text-lg">
                            ${u.name}
                        </div>

                        <div class="text-xs text-gray-400 mt-1">
                            ${u.email}
                        </div>

                    </div>

                    <div class="text-right">

                        <div class="font-black text-pink-500 text-2xl">
                            ${(u.points || 0).toLocaleString()}P
                        </div>

                    </div>

                </div>

                <div class="flex gap-3">

                    <button
                    onclick="adjustPoint('${uid}',${u.points || 0})"
                    class="flex-1 bg-black text-white py-4 rounded-2xl font-black text-sm">

                        포인트 지급

                    </button>

                    <button
                    onclick="toggleUser('${uid}','${u.status}','${u.email}')"
                    class="flex-1 py-4 rounded-2xl text-white font-black text-sm
                    ${u.status === 'active'
                    ? 'bg-red-400'
                    : 'bg-green-400'}">

                        ${u.status === 'active'
                        ? '이용 제한'
                        : '제한 해제'}

                    </button>

                </div>

            </div>
            `;

        });

    });

}

function adjustPoint(uid,current){

    const value = prompt("추가 또는 차감할 포인트를 입력해주세요");

    if(!value) return;

    db.collection('users')
    .doc(uid)
    .update({

        points:current + Number(value)

    });

}

function toggleUser(uid,status,email){

    if(email === ADMIN_EMAIL){

        alert("최고 관리자는 제한할 수 없습니다.");
        return;

    }

    const ok = confirm("회원 상태를 변경하시겠습니까?");

    if(!ok) return;

    db.collection('users')
    .doc(uid)
    .update({

        status:status === 'active'
        ? 'blocked'
        : 'active'

    });

}

function loadRanking(){

    db.collection('users')
    .orderBy('points','desc')
    .limit(5)
    .onSnapshot((snapshot)=>{

        const list = document.getElementById('ranking-list');

        list.innerHTML = "";

        let rank = 1;

        snapshot.forEach((doc)=>{

            const user = doc.data();

            list.innerHTML += `
            <div class="flex justify-between items-center border border-gray-100 rounded-2xl p-4">

                <div class="font-black">
                    ${rank}위 · ${user.name}
                </div>

                <div class="text-pink-500 font-black">
                    ${(user.points || 0).toLocaleString()}P
                </div>

            </div>
            `;

            rank++;

        });

    });

}

function setNotice(){

    const text = prompt("공지사항 내용을 입력해주세요");

    if(!text) return;

    db.collection('settings')
    .doc('notice')
    .set({

        text:text

    });

}

function loadNotice(){

    db.collection('settings')
    .doc('notice')
    .onSnapshot((doc)=>{

        const area = document.getElementById('notice-area');

        if(!doc.exists){

            area.innerText = "현재 진행 중인 공지사항이 없습니다.";
            return;

        }

        area.innerText = doc.data().text;

    });

}

function switchTab(tab){

    document.getElementById('tab-home').classList.add('hidden');
    document.getElementById('tab-shop').classList.add('hidden');
    document.getElementById('tab-admin').classList.add('hidden');

    document.getElementById('nav-home').classList.remove('active-nav');
    document.getElementById('nav-shop').classList.remove('active-nav');
    document.getElementById('nav-admin').classList.remove('active-nav');

    document.getElementById('tab-' + tab)
    .classList.remove('hidden');

    document.getElementById('nav-' + tab)
    .classList.add('active-nav');

    window.scrollTo(0,0);

}
function sendMail(uid, msg){

    db.collection("mail").add({
        uid: uid,
        msg: msg,
        read: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

}

function loadMail(){

    db.collection("mail")
    .where("uid","==",auth.currentUser.uid)
    .orderBy("createdAt","desc")
    .onSnapshot((snap)=>{

        console.log("📬 우편함");

        snap.forEach(doc=>{
            console.log(doc.data().msg);
        });

    });

}


function approveMission(id, uid, point){

    db.collection("missions")
    .doc(id)
    .update({
        status:"approved"
    });

    db.collection("users")
    .doc(uid)
    .update({
        points: firebase.firestore.FieldValue.increment(point)
    });

    sendMail(uid, `미션 승인 +${point}P`);

}



function rejectMission(id, uid){

    db.collection("missions")
    .doc(id)
    .update({
        status:"rejected"
    });

    sendMail(uid, "미션이 거절되었습니다");

}



function addHistory(type, point){

    db.collection("history").add({
        uid: auth.currentUser.uid,
        type: type,
        point: point,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

}




function watchAd(){

    db.collection("users")
    .doc(auth.currentUser.uid)
    .update({
        points: firebase.firestore.FieldValue.increment(10)
    });

    addHistory("광고 시청", 10);

    alert("+10P 지급 완료!");
}





</script>
