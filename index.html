<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>포인트 톡톡 -즐거운 포인트 생활</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#ff4da6,#ff9ad5);
  color:#333;
}

.card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#ff4da6;
  color:white;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}

h2,h3{ margin:5px 0; }
.small{font-size:12px;color:gray;}
</style>
</head>

<body>

<div class="card" id="authBox">
<h2>💖 포인트 톡톡</h2>
<input id="email" placeholder="이메일">
<input id="pw" type="password" placeholder="비밀번호">
<button onclick="login()">로그인</button>
<button onclick="signup()">회원가입</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>💰 내 포인트: <span id="point">0</span></h3>
<button onclick="watchAd()">📺 광고보고 +10P</button>
</div>

<div class="card">
<h3>📌 미션 제출</h3>
<input id="missionText" placeholder="미션 입력">
<button onclick="submitMission()">제출</button>
</div>

<div class="card">
<h3>📬 우편함</h3>
<div id="mail"></div>
</div>

<div class="card">
<h3>📊 포인트 내역</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>🎁 친구초대 코드</h3>
<div id="ref"></div>
</div>

<button onclick="logout()">로그아웃</button>

</div>

<!-- 관리자 -->
<div class="card" id="adminBox" style="display:none;background:#222;color:white">
<h3>관리자</h3>
<div id="admin"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let user = null;

/* 로그인 */
function login(){
  auth.signInWithEmailAndPassword(email.value,pw.value);
}

/* 회원가입 */
function signup(){
  auth.createUserWithEmailAndPassword(email.value,pw.value)
  .then(u=>{
    db.ref("users/"+u.user.uid).set({
      point:0,
      admin:false,
      ref:Math.random().toString(36).substr(2,6)
    });
  });
}

/* 상태 */
auth.onAuthStateChanged(u=>{
  if(u){
    user=u;
    authBox.style.display="none";
    app.style.display="block";
    loadUser();
  }
});

/* 유저 */
function loadUser(){
  db.ref("users/"+user.uid).on("value",snap=>{
    let d=snap.val();
    if(!d) return;

    point.innerText=d.point;
    ref.innerText="초대코드: "+d.ref;

    if(d.admin){
      adminBox.style.display="block";
      loadAdmin();
    }

    loadMail();
    loadHistory();
  });
}

/* 광고 */
function watchAd(){
  db.ref("users/"+user.uid+"/point").transaction(p=>(p||0)+10);
  addHistory("+10 광고");
}

/* 미션 */
function submitMission(){
  db.ref("missions").push({
    uid:user.uid,
    text:missionText.value,
    status:"pending"
  });
}

/* 관리자 */
function loadAdmin(){
  db.ref("missions").on("value",snap=>{
    let html="";
    snap.forEach(m=>{
      let v=m.val();
      if(v.status=="pending"){
        html+=`
        <div>
          ${v.text}
          <button onclick="approve('${m.key}','${v.uid}')">승인</button>
          <button onclick="reject('${m.key}','${v.uid}')">거절</button>
        </div>`;
      }
    });
    admin.innerHTML=html;
  });
}

/* 승인 */
function approve(id,uid){
  db.ref("missions/"+id).update({status:"ok"});
  db.ref("users/"+uid+"/point").transaction(p=>(p||0)+50);
  sendMail(uid,"미션 승인 +50P");
}

/* 거절 */
function reject(id,uid){
  db.ref("missions/"+id).update({status:"no"});
  sendMail(uid,"미션 거절됨");
}

/* 우편 */
function sendMail(uid,msg){
  db.ref("mail/"+uid).push({msg,time:Date.now()});
}

function loadMail(){
  db.ref("mail/"+user.uid).on("value",snap=>{
    let html="";
    snap.forEach(m=>{
      html+=`<div class="small">${m.val().msg}</div>`;
    });
    mail.innerHTML=html;
  });
}

/* 히스토리 */
function addHistory(t){
  db.ref("history/"+user.uid).push({text:t});
}

function loadHistory(){
  db.ref("history/"+user.uid).on("value",snap=>{
    let html="";
    snap.forEach(h=>{
      html+=`<div class="small">${h.val().text}</div>`;
    });
    history.innerHTML=html;
  });
}

function logout(){
  auth.signOut();
}
</script>

</body>
</html>
