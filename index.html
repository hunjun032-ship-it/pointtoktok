<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포인트 톡톡 V2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body { font-family: sans-serif; background:#f5f5f5; margin:0; }
.box { padding:15px; margin:10px; background:white; border-radius:10px; }
button { padding:10px; margin-top:5px; width:100%; }
input { width:100%; padding:10px; margin:5px 0; }
.admin { background:#222; color:white; }
.small { font-size:12px; color:gray; }
</style>
</head>

<body>

<div class="box" id="authBox">
<h3>로그인</h3>
<input id="email" placeholder="이메일">
<input id="pw" type="password" placeholder="비밀번호">
<button onclick="login()">로그인</button>
<button onclick="signup()">회원가입</button>
</div>

<div class="box" id="main" style="display:none">

<h3>내 포인트: <span id="point">0</span></h3>

<button onclick="watchAd()">📺 광고 보고 포인트 +10</button>

<h4>미션 제출</h4>
<input id="missionText" placeholder="미션 내용">
<button onclick="submitMission()">제출</button>

<h4>우편함</h4>
<div id="mail"></div>

<h4>포인트 내역</h4>
<div id="history"></div>

<h4>친구초대 코드</h4>
<div id="refCode"></div>

<button onclick="logout()">로그아웃</button>
</div>

<!-- 관리자 -->
<div class="box admin" id="adminBox" style="display:none">
<h3>관리자 패널</h3>
<div id="adminMissions"></div>
</div>

<script>
// 🔥 Firebase 설정 (여기 너꺼로 바꿔야 됨)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;

/* 로그인 */
function login(){
  auth.signInWithEmailAndPassword(
    email.value, pw.value
  );
}

/* 회원가입 */
function signup(){
  auth.createUserWithEmailAndPassword(email.value, pw.value)
  .then(u=>{
    db.ref("users/"+u.user.uid).set({
      point:0,
      admin:false,
      ref:Math.random().toString(36).substr(2,6)
    });
  });
}

/* 상태 */
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("authBox").style.display="none";
    document.getElementById("main").style.display="block";

    loadUser();
  }
});

/* 유저 데이터 */
function loadUser(){
  db.ref("users/"+currentUser.uid).on("value", snap=>{
    let d = snap.val();
    if(!d) return;

    point.innerText = d.point;
    refCode.innerText = "초대코드: " + d.ref;

    if(d.admin){
      adminBox.style.display="block";
      loadAdmin();
    }

    loadMail();
    loadHistory();
  });
}

/* 광고 */
function watchAd(){
  db.ref("users/"+currentUser.uid+"/point").transaction(p=> (p||0)+10);
  addHistory("+10 (광고)");
}

/* 미션 제출 */
function submitMission(){
  db.ref("missions").push({
    uid: currentUser.uid,
    text: missionText.value,
    status:"pending"
  });
  alert("제출됨");
}

/* 관리자 */
function loadAdmin(){
  db.ref("missions").on("value", snap=>{
    let html="";
    snap.forEach(m=>{
      let v=m.val();
      if(v.status=="pending"){
        html += `
        <div class="box">
          ${v.text}
          <button onclick="approve('${m.key}','${v.uid}')">승인</button>
          <button onclick="reject('${m.key}','${v.uid}')">거절</button>
        </div>`;
      }
    });
    adminMissions.innerHTML=html;
  });
}

/* 승인 */
function approve(id, uid){
  db.ref("missions/"+id).update({status:"done"});
  db.ref("users/"+uid+"/point").transaction(p=>(p||0)+50);
  sendMail(uid,"미션 승인됨 +50P");
}

/* 거절 */
function reject(id, uid){
  db.ref("missions/"+id).update({status:"reject"});
  sendMail(uid,"미션 거절됨");
}

/* 우편함 */
function sendMail(uid, msg){
  db.ref("mail/"+uid).push({
    msg,
    time:Date.now(),
    read:false
  });
}

function loadMail(){
  db.ref("mail/"+currentUser.uid).on("value", snap=>{
    let html="";
    snap.forEach(m=>{
      html += `<div>${m.val().msg}</div>`;
    });
    mail.innerHTML=html;
  });
}

/* 히스토리 */
function addHistory(text){
  db.ref("history/"+currentUser.uid).push({
    text,
    time:Date.now()
  });
}

function loadHistory(){
  db.ref("history/"+currentUser.uid).on("value", snap=>{
    let html="";
    snap.forEach(h=>{
      html += `<div class="small">${h.val().text}</div>`;
    });
    history.innerHTML=html;
  });
}

/* 로그아웃 */
function logout(){
  auth.signOut();
}
</script>

</body>
</html>
