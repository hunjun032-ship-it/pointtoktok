<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>포인트톡톡</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:sans-serif;background:#fff7fb}
.hidden{display:none}
.card{background:#fff;padding:12px;margin:10px;border-radius:12px}
button{cursor:pointer;margin:4px}
</style>
</head>

<body>

<div id="app" class="hidden">

<h2>포인트톡톡</h2>

<div id="point"></div>

<button onclick="sendTicket()">고객센터</button>
<button onclick="openMailbox()">우편함</button>

<div id="mailbox"></div>

<hr/>

<h3>미션</h3>
<div id="missions"></div>

<hr/>

<h3>관리자</h3>
<div id="admin" class="hidden">

<h4>미션 승인/거절</h4>
<div id="submissions"></div>

<h4>유저 관리</h4>
<div id="users"></div>

</div>

</div>

<script>

/* ================= FIREBASE ================= */

firebase.initializeApp({
apiKey:"AIzaSyAarFKJOQ9RVzMQp0mcEmtJfFkHESPxiRQ",
authDomain:"point-toktok-d66e4.firebaseapp.com",
projectId:"point-toktok-d66e4"
});

const auth=firebase.auth();
const db=firebase.firestore();

const ADMIN_EMAIL="hunjun032@gmail.com";

let me=null;

/* ================= LOGIN ================= */

auth.onAuthStateChanged(async(user)=>{

if(!user){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
return;
}

document.getElementById("app").classList.remove("hidden");

const ref=db.collection("users").doc(user.uid);
const snap=await ref.get();

if(!snap.exists){
await ref.set({
name:user.displayName,
email:user.email,
points:0,
status:"active",
statusReason:""
});
}

ref.onSnapshot(doc=>{
me=doc.data();

document.getElementById("point").innerText=
"포인트: "+me.points+" | 상태: "+(me.statusReason||"정상");

if(me.email===ADMIN_EMAIL){
document.getElementById("admin").classList.remove("hidden");
loadUsers();
loadSubmissions();
}
});

loadMissions();
loadMailbox();

});

/* ================= MISSIONS ================= */

function loadMissions(){

db.collection("missions").onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
const m=doc.data();

html+=`
<div class="card">
<b>${m.title}</b> (+${m.points})
<br/>
<button onclick="submitMission('${doc.id}')">제출</button>
</div>`;
});

document.getElementById("missions").innerHTML=html;

});

}

function submitMission(id){

const proof=prompt("미션 내용");

db.collection("missionSubmissions").add({
missionId:id,
uid:auth.currentUser.uid,
userName:me.name,
status:"pending",
proof
});

}

/* ================= ADMIN ================= */

function loadSubmissions(){

db.collection("missionSubmissions")
.where("status","==","pending")
.onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
const s=doc.data();

html+=`
<div class="card">
<b>${s.userName}</b><br/>
${s.proof}

<br/>
<button onclick="approve('${doc.id}','${s.uid}')">승인 +100</button>
<button onclick="reject('${doc.id}','${s.uid}')">거절</button>
</div>`;
});

document.getElementById("submissions").innerHTML=html;

});

}

async function approve(id,uid){

await db.collection("missionSubmissions").doc(id).update({
status:"approved"
});

await db.collection("users").doc(uid).update({
points:firebase.firestore.FieldValue.increment(100)
});

}

function reject(id,uid){

const reason=prompt("거절 사유");

db.collection("missionSubmissions").doc(id).update({
status:"rejected",
reason
});

db.collection("mailbox").add({
uid,
title:"미션 거절",
message:reason
});

}

/* ================= CUSTOMER ================= */

function sendTicket(){

const msg=prompt("문의 내용");

db.collection("tickets").add({
uid:auth.currentUser.uid,
msg,
reply:""
});

}

/* ================= MAILBOX ================= */

function loadMailbox(){

db.collection("mailbox")
.where("uid","==",auth.currentUser.uid)
.onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
const d=doc.data();

html+=`
<div class="card">
<b>${d.title}</b><br/>
${d.message}
</div>`;
});

document.getElementById("mailbox").innerHTML=html;

});

}

/* ================= USER CONTROL ================= */

function loadUsers(){

db.collection("users").onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
const u=doc.data();

html+=`
<div class="card">
${u.name} (${u.points})
<br/>
<button onclick="blockUser('${doc.id}')">정지</button>
</div>`;
});

document.getElementById("users").innerHTML=html;

});

}

function blockUser(uid){

const reason=prompt("정지 사유");

db.collection("users").doc(uid).update({
status:"blocked",
statusReason:reason
});

}

function openMailbox(){
alert("우편함 아래에 표시됨");
}

</script>

</body>
</html>
