<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>포인트톡톡</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:sans-serif;background:#fff7fb}
.hidden{display:none!important}
button{cursor:pointer}
</style>
</head>

<body>

<!-- 로그인 -->
<div id="login-page">
    <button onclick="login()">Google 로그인</button>
</div>

<!-- 앱 -->
<div id="app-layout" class="hidden">

    <h1>포인트톡톡</h1>

    <div id="point-text">0 P</div>

    <button onclick="attendance()">출석</button>

    <h2>미션</h2>
    <div id="mission-list"></div>

    <h2>상품</h2>
    <div id="product-list"></div>

    <h2>랭킹</h2>
    <div id="ranking-list"></div>

    <h2>공지</h2>
    <div id="notice-area"></div>

</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyAarFKJOQ9RVzMQp0mcEmtJfFkHESPxiRQ",
    authDomain: "point-toktok-d66e4.firebaseapp.com",
    projectId: "point-toktok-d66e4",
    storageBucket: "point-toktok-d66e4.appspot.com",
    messagingSenderId: "821851386502",
    appId: "1:821851386502:web:da04381c5d5ddec9525707"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const ADMIN_EMAIL = "hunjun032@gmail.com";

let myData = null;

// ================= AUTH =================
auth.onAuthStateChanged(async(user)=>{

    if(user){
        document.getElementById("login-page").classList.add("hidden");
        document.getElementById("app-layout").classList.remove("hidden");

        await initUser(user);

        loadMissions();
        loadProducts();
        loadRanking();
        loadNotice();

    } else {
        document.getElementById("login-page").classList.remove("hidden");
        document.getElementById("app-layout").classList.add("hidden");
    }

});

function login(){
    auth.signInWithPopup(provider);
}

function logout(){
    auth.signOut();
}

// ================= USER =================
async function initUser(user){

    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();

    const isAdmin = user.email === ADMIN_EMAIL;

    if(!snap.exists){
        await ref.set({
            name: user.displayName || "user",
            email: user.email,
            points: 0,
            isAdmin,
            lastAttendance: ""
        });
    }

    ref.onSnapshot(doc=>{
        myData = doc.data();

        document.getElementById("point-text").innerText =
            (myData.points || 0) + " P";
    });
}

// ================= ATTENDANCE =================
function attendance(){

    const today = new Date().toLocaleDateString();

    if(myData.lastAttendance === today){
        alert("이미 출석했음");
        return;
    }

    db.collection("users")
    .doc(auth.currentUser.uid)
    .update({
        points: firebase.firestore.FieldValue.increment(100),
        lastAttendance: today
    });
}

// ================= MISSIONS =================
function loadMissions(){

    db.collection("missions")
    .orderBy("createdAt","desc")
    .onSnapshot(snap=>{

        const list = document.getElementById("mission-list");
        list.innerHTML = "";

        snap.forEach(doc=>{

            const m = doc.data();

            list.innerHTML += `
            <div>
                <b>${m.title}</b> (+${m.points})
                ${myData?.isAdmin ? `
                    <button onclick="deleteMission('${doc.id}')">삭제</button>
                ` : ""}
            </div>
            `;
        });

    });
}

function addMission(){

    const title = prompt("미션");
    const points = prompt("포인트");

    db.collection("missions").add({
        title,
        points:Number(points),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
}

function deleteMission(id){
    if(!confirm("삭제?")) return;
    db.collection("missions").doc(id).delete();
}

// ================= PRODUCTS =================
function loadProducts(){

    db.collection("products")
    .orderBy("createdAt","desc")
    .onSnapshot(snap=>{

        const list = document.getElementById("product-list");
        list.innerHTML = "";

        snap.forEach(doc=>{
            const p = doc.data();

            list.innerHTML += `
            <div>
                ${p.name} (${p.point}P)
            </div>
            `;
        });

    });
}

function addProduct(){

    const name = prompt("상품");
    const point = prompt("포인트");

    db.collection("products").add({
        name,
        point:Number(point),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
}

// ================= EXCHANGE =================
function exchangeProduct(name, point){

    if(myData.points < point){
        alert("부족");
        return;
    }

    db.collection("users")
    .doc(auth.currentUser.uid)
    .update({
        points: firebase.firestore.FieldValue.increment(-point)
    });
}

// ================= RANKING =================
function loadRanking(){

    db.collection("users")
    .orderBy("points","desc")
    .limit(5)
    .onSnapshot(snap=>{

        const list = document.getElementById("ranking-list");
        list.innerHTML = "";

        let i = 1;

        snap.forEach(doc=>{
            const u = doc.data();

            list.innerHTML += `
            <div>
                ${i++}위 ${u.name} - ${u.points}
            </div>
            `;
        });

    });
}

// ================= NOTICE =================
function loadNotice(){

    db.collection("settings")
    .doc("notice")
    .onSnapshot(doc=>{
        document.getElementById("notice-area").innerText =
        doc.exists ? doc.data().text : "공지 없음";
    });

}

</script>

</body>
</html>
