<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>전쟁 시뮬레이션</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#game{
    width:100%;
    height:500px;
    background:#222;
    position:relative;
    overflow:hidden;
}

.base{
    position:absolute;
    width:80px;
    height:80px;
    background:blue;
    bottom:10px;
    left:10px;
}

.enemy-base{
    position:absolute;
    width:80px;
    height:80px;
    background:red;
    bottom:10px;
    right:10px;
}

.unit{
    width:20px;
    height:20px;
    background:white;
    position:absolute;
    border-radius:50%;
}

.enemy{
    background:pink;
}

button{
    padding:10px;
    margin:10px;
}

</style>
</head>

<body>

<h1>⚔ 전쟁 시뮬레이션</h1>

<button onclick="spawnUnit()">병사 생성 (10$)</button>

<div id="game">

    <div class="base"></div>
    <div class="enemy-base"></div>

</div>

<script>

let money = 100;
let enemyHP = 100;

const game = document.getElementById("game");

// 💰 돈 자동 증가
setInterval(()=>{
    money += 5;
},1000);

// 🪖 병사 생성
function spawnUnit(){

    if(money < 10){
        alert("돈 부족");
        return;
    }

    money -= 10;

    const unit = document.createElement("div");
    unit.className = "unit";

    let x = 20;
    let y = 450;

    unit.style.left = x + "px";
    unit.style.top = y + "px";

    game.appendChild(unit);

    let move = setInterval(()=>{

        x += 2;
        unit.style.left = x + "px";

        // 적 기지 도착
        if(x > 700){

            enemyHP -= 10;
            unit.remove();
            clearInterval(move);

            if(enemyHP <= 0){
                alert("승리!");
            }

        }

    },30);

}

// 적 자동 공격 (시뮬레이션)
setInterval(()=>{

    const enemy = document.createElement("div");
    enemy.className = "unit enemy";

    let x = 700;
    let y = 450;

    enemy.style.left = x + "px";
    enemy.style.top = y + "px";

    game.appendChild(enemy);

    let move = setInterval(()=>{

        x -= 2;
        enemy.style.left = x + "px";

        if(x < 80){
            enemy.remove();
            clearInterval(move);
        }

    },30);

},2000);

</script>

</body>
</html>
